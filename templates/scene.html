<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f6b26b">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <title>GN-AKARI Scene</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/scene.css') }}">
</head>
<body>
  <header class="page-header">
    <h1>GN-AKARI</h1>
    <nav class="page-nav" aria-label="Primary">
      <a href="/">立ち絵合成</a>
      <a href="/scene" class="is-active" aria-current="page">写真合成</a>
      <a href="/gallery">ギャラリー</a>
      <a href="/settings">設定</a>
    </nav>
  </header>

  {% if error_message %}
  <div class="error">{{ error_message }}</div>
  {% endif %}

  <div class="layout">
    <section class="panel">
      <h2>合成設定</h2>
      <form id="scene-form">
        <input type="hidden" id="base-image-name" name="base_image_name" value="">
        <input type="hidden" id="base-image-display-name" value="">
        <input type="hidden" id="portrait-filename" name="portrait_filename" value="{{ selected_portrait_filename or '' }}">
        <input type="hidden" id="character2-portrait-filename" name="character2_portrait_filename" value="">
        <input type="hidden" id="layer-order" name="layer_order" value="">
        <input type="hidden" id="layer-order-mode" name="layer_order_mode" value="">

        <div class="settings-block" data-section-key="base" data-layer-id="base_image">
          <button type="button" class="settings-block-header" data-settings-toggle="base" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">ベース画像設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body">
          <div class="field">
            <label for="base-image">ベース画像</label>
            <input id="base-image" name="base_image" type="file" accept="image/png,image/jpeg,image/webp">
            <div class="field-note">画像アップロード上限は 20MB です。</div>
            <div id="base-image-source" class="base-image-source"></div>
          </div>

          <div class="field">
            <label for="base-fit-mode">Fit</label>
            <select id="base-fit-mode" name="base_fit_mode" required>
              <option value="contain" selected>contain</option>
              <option value="cover">cover</option>
            </select>
          </div>

          <div class="row">
            <div class="field">
              <label for="base-scale">Scale</label>
              <input id="base-scale" name="base_scale" type="number" value="100" min="1">
            </div>
            <div class="field">
              <label for="base-x">ベース画像 X</label>
              <input id="base-x" name="base_x" type="number" value="0">
            </div>
            <div class="field">
              <label for="base-y">ベース画像 Y</label>
              <input id="base-y" name="base_y" type="number" value="0">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block is-hidden" data-section-key="canvas">
          <button type="button" class="settings-block-header" data-settings-toggle="canvas" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">Canvas設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body">
          <div class="field">
            <label for="canvas-preset">Canvas</label>
            <select id="canvas-preset" name="canvas_preset" required>
              {% for preset_name, dimensions in canvas_presets.items() %}
              <option value="{{ preset_name }}" {% if preset_name == "16:9" %}selected{% endif %}>
                {{ preset_name }} ({{ dimensions[0] }}x{{ dimensions[1] }})
              </option>
              {% endfor %}
            </select>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="character1" data-layer-id="character1">
          <button type="button" class="settings-block-header" data-settings-toggle="character1" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">キャラ1設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="character1-enabled">
                <input id="character1-enabled" name="character1_enabled" type="checkbox" value="1" checked>
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body">
          <div class="field">
            <label for="cache-key">Preview</label>
            <select id="cache-key" name="cache_key">
              <option value="">preview を選択してください</option>
              {% for source in preview_sources %}
              <option value="{{ source.cache_key }}" {% if not source.preview_available %}disabled{% endif %}>
                {{ source.psd_filename }} ({{ source.cache_key }}){% if not source.preview_available %} - preview未生成{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label for="position-x">X</label>
              <input id="position-x" name="x" type="number" value="0">
            </div>
            <div class="field">
              <label for="position-y">Y</label>
              <input id="position-y" name="y" type="number" value="0">
            </div>
            <div class="field">
              <label for="scale">Scale</label>
              <input id="scale" name="scale" type="number" value="100" min="1">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="character2" data-layer-id="character2">
          <button type="button" class="settings-block-header" data-settings-toggle="character2" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">キャラ2設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="character2-enabled">
                <input id="character2-enabled" name="character2_enabled" type="checkbox" value="1">
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body">
          <div class="field">
            <label for="character2-cache-key">Preview</label>
            <select id="character2-cache-key" name="character2_cache_key">
              <option value="">preview を選択してください</option>
              {% for source in preview_sources %}
              <option value="{{ source.cache_key }}" {% if not source.preview_available %}disabled{% endif %}>
                {{ source.psd_filename }} ({{ source.cache_key }}){% if not source.preview_available %} - preview未生成{% endif %}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label for="character2-x">X</label>
              <input id="character2-x" name="character2_x" type="number" value="0">
            </div>
            <div class="field">
              <label for="character2-y">Y</label>
              <input id="character2-y" name="character2_y" type="number" value="0">
            </div>
            <div class="field">
              <label for="character2-scale">Scale</label>
              <input id="character2-scale" name="character2_scale" type="number" value="100" min="1">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="text" data-layer-id="text1">
          <button type="button" class="settings-block-header" data-settings-toggle="text" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">テキスト設定1</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="text-enabled">
                <input id="text-enabled" name="text_enabled" type="checkbox" value="1" checked>
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body settings-block-body--compact">
          <div class="field">
            <label for="text-value">テキスト</label>
            <textarea id="text-value" name="text_value" rows="4" placeholder="表示するテキストを入力"></textarea>
          </div>
          <div class="field">
            <label for="text-font">フォント</label>
            <select id="text-font" name="text_font">
              <option value="">既定フォント</option>
            </select>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text-size">サイズ</label>
              <input id="text-size" name="text_size" type="number" value="32" min="1">
            </div>
            <div class="field">
              <label for="text-color">色</label>
              <input id="text-color" name="text_color" type="color" value="#ffffff">
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text-x">X</label>
              <input id="text-x" name="text_x" type="number" value="0">
            </div>
            <div class="field">
              <label for="text-y">Y</label>
              <input id="text-y" name="text_y" type="number" value="0">
            </div>
          </div>
          <div class="toggle-row">
            <div class="field">
              <label class="inline-toggle" for="text-stroke-enabled">
                <input id="text-stroke-enabled" name="text_stroke_enabled" type="checkbox" value="1">
                <span>縁取り</span>
              </label>
            </div>
            <div class="field">
              <label class="inline-toggle" for="text-debug-layout">
                <input id="text-debug-layout" type="checkbox" value="1">
                <span>Debug枠</span>
              </label>
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text-stroke-color">縁取り色</label>
              <input id="text-stroke-color" name="text_stroke_color" type="color" value="#000000">
            </div>
            <div class="field">
              <label for="text-stroke-width">縁取り幅</label>
              <input id="text-stroke-width" name="text_stroke_width" type="number" value="2" min="0">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="text2" data-layer-id="text2">
          <button type="button" class="settings-block-header" data-settings-toggle="text2" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">テキスト設定2</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="text2-enabled">
                <input id="text2-enabled" name="text2_enabled" type="checkbox" value="1">
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body settings-block-body--compact">
          <div class="field">
            <label for="text2-value">テキスト</label>
            <textarea id="text2-value" name="text2_value" rows="3" placeholder="2つ目のテキストを入力"></textarea>
          </div>
          <div class="field">
            <label for="text2-font">フォント</label>
            <select id="text2-font" name="text2_font">
              <option value="">既定フォント</option>
            </select>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text2-size">サイズ</label>
              <input id="text2-size" name="text2_size" type="number" value="64" min="1">
            </div>
            <div class="field">
              <label for="text2-color">色</label>
              <input id="text2-color" name="text2_color" type="color" value="#ffffff">
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text2-x">X</label>
              <input id="text2-x" name="text2_x" type="number" value="100">
            </div>
            <div class="field">
              <label for="text2-y">Y</label>
              <input id="text2-y" name="text2_y" type="number" value="100">
            </div>
          </div>
          <div class="toggle-row">
            <div class="field">
              <label class="inline-toggle" for="text2-stroke-enabled">
                <input id="text2-stroke-enabled" name="text2_stroke_enabled" type="checkbox" value="1">
                <span>縁取り</span>
              </label>
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="text2-stroke-color">縁取り色</label>
              <input id="text2-stroke-color" name="text2_stroke_color" type="color" value="#000000">
            </div>
            <div class="field">
              <label for="text2-stroke-width">縁取り幅</label>
              <input id="text2-stroke-width" name="text2_stroke_width" type="number" value="2" min="0">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="message-band" data-layer-id="message_band">
          <button type="button" class="settings-block-header" data-settings-toggle="message-band" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">メッセージ帯設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="message-band-enabled">
                <input id="message-band-enabled" name="message_band_enabled" type="checkbox" value="1">
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body settings-block-body--compact">
          <div class="row row--2">
            <div class="field">
              <label for="message-band-x">X</label>
              <input id="message-band-x" name="message_band_x" type="number" value="0">
            </div>
            <div class="field">
              <label for="message-band-y">Y</label>
              <input id="message-band-y" name="message_band_y" type="number" value="760">
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="message-band-width">W</label>
              <input id="message-band-width" name="message_band_width" type="number" value="1920" min="1">
            </div>
            <div class="field">
              <label for="message-band-height">H</label>
              <input id="message-band-height" name="message_band_height" type="number" value="220" min="1">
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="message-band-color">色</label>
              <input id="message-band-color" name="message_band_color" type="color" value="#000000">
            </div>
            <div class="field">
              <label for="message-band-opacity">透明度</label>
              <input id="message-band-opacity" name="message_band_opacity" type="number" value="0.65" min="0" max="1" step="0.05">
            </div>
          </div>
          </div>
        </div>

        <div class="settings-block" data-section-key="overlay" data-layer-id="overlay_image">
          <button type="button" class="settings-block-header" data-settings-toggle="overlay" aria-expanded="true">
            <span class="settings-block-header-main">
              <h3 class="settings-block-title">画像オーバーレイ設定</h3>
            </span>
            <span class="settings-block-header-actions">
              <label class="section-visible-toggle" for="bubble-overlay-enabled">
                <input id="bubble-overlay-enabled" name="bubble_overlay_enabled" type="checkbox" value="1">
                <span class="visibility-icon" aria-hidden="true"></span>
              </label>
              <span class="settings-block-toggle" aria-hidden="true"></span>
            </span>
          </button>
          <div class="settings-block-body">
          <input id="bubble-overlay-source-type" name="bubble_overlay_source_type" type="hidden" value="asset">
          <div id="overlay-asset-panel" class="overlay-source-panel">
          <div class="field">
            <label for="bubble-overlay-asset">素材選択</label>
            <select id="bubble-overlay-asset" name="bubble_overlay_asset">
              {% for bubble_id, bubble in bubble_overlay_assets.items() %}
              <option value="{{ bubble_id }}">{{ bubble.label }}</option>
              {% endfor %}
            </select>
            <div class="field-note">素材の追加・削除は設定ページで行います。画像アップロード上限は 20MB です。</div>
          </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="bubble-overlay-x">X</label>
              <input id="bubble-overlay-x" name="bubble_overlay_x" type="number" value="180">
            </div>
            <div class="field">
              <label for="bubble-overlay-y">Y</label>
              <input id="bubble-overlay-y" name="bubble_overlay_y" type="number" value="220">
            </div>
          </div>
          <div class="row row--2">
            <div class="field">
              <label for="bubble-overlay-width">W</label>
              <input id="bubble-overlay-width" name="bubble_overlay_width" type="number" value="420" min="1">
            </div>
            <div class="field">
              <label for="bubble-overlay-height">H</label>
              <input id="bubble-overlay-height" name="bubble_overlay_height" type="number" value="180" min="1">
            </div>
          </div>
          </div>
        </div>

        <button type="submit" title="保存">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
          保存
        </button>
      </form>
      <div id="scene-status" class="status"></div>
    </section>

    <section class="panel">
      <h2>Preview</h2>
      <div id="current-source" class="current-source"></div>
      <p id="scene-link-row" class="{% if not scene_image %}is-hidden{% endif %}">
        <a id="scene-link" href="{% if scene_image %}/outputs/{{ scene_image }}{% endif %}" target="_blank">
          {{ scene_image or '' }}
        </a>
      </p>
      <div id="scene-empty" class="empty {% if scene_image %}is-hidden{% endif %}">
        合成結果はまだありません。
      </div>
      <div id="scene-stage" class="preview-stage {% if not scene_image %}is-hidden{% endif %}">
        <div id="preview-stage-viewport" class="preview-stage-viewport">
          <div id="preview-stage-scale" class="preview-stage-scale">
            <div id="preview-canvas" class="preview-canvas">
              <img id="base-layer" class="preview-layer is-hidden" alt="base image preview">
              <div id="message-band-layer" class="preview-message-band-layer is-hidden"></div>
              <img id="portrait-layer" class="preview-layer preview-layer--portrait is-hidden" alt="portrait preview">
              <img id="portrait-layer-2" class="preview-layer preview-layer--portrait is-hidden" alt="portrait preview 2">
              <img id="bubble-overlay-layer" class="preview-overlay-layer is-hidden" alt="bubble overlay preview">
              <div id="bubble-overlay-resize-handle-right" class="preview-overlay-resize-handle preview-overlay-resize-handle--right" aria-hidden="true"></div>
              <div id="bubble-overlay-resize-handle-bottom" class="preview-overlay-resize-handle preview-overlay-resize-handle--bottom" aria-hidden="true"></div>
              <div id="bubble-debug-rect" class="preview-debug-rect preview-debug-rect--bubble"></div>
              <div id="text-layer-2" class="preview-text-layer is-hidden">
                <div id="text-box-debug-rect-2" class="preview-debug-rect preview-debug-rect--text"></div>
                <div id="text-content-box-2" class="preview-text-content-box">
                  <div id="text-content-2" class="preview-text-content"></div>
                </div>
              </div>
              <div id="text-layer" class="preview-text-layer is-hidden">
                <div id="text-box-debug-rect" class="preview-debug-rect preview-debug-rect--text"></div>
                <div id="text-content-box" class="preview-text-content-box">
                  <div id="text-content" class="preview-text-content"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    window.sceneBootstrap = {
      canvasPresets: {{ canvas_presets | tojson }},
      bubbleOverlayAssets: {{ bubble_overlay_assets | tojson }},
      initialPortraitFilename: {{ (selected_portrait_filename or '') | tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='js/scene.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pwa-register.js') }}" defer></script>
</body>
</html>
